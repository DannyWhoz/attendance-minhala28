<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="fontawesome/all.min.css">
  <title>מערכת נוכחות</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body[data-page="index"] {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f5f5f5;
      color: var(--ms-text);
    }

    body[data-page="index"] .index-shell {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 52px 18px 40px;
    }

    body[data-page="index"] .picker-card {
      width: min(100%, 680px);
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid var(--ms-border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    body[data-page="index"] .picker-card[data-ready="1"] {
      border-color: rgba(16, 124, 16, 0.22);
      box-shadow: 0 2px 10px rgba(16, 124, 16, 0.08);
    }

    body[data-page="index"] .picker-head {
      display: grid;
      gap: 14px;
    }

    body[data-page="index"] .picker-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    body[data-page="index"] .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 12px;
      border-radius: 999px;
      background: #f3f2f1;
      color: var(--ms-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    body[data-page="index"] .connection-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 0 12px;
      border: 1px solid #d8dde8;
      border-radius: 999px;
      background: #fafafa;
      color: var(--ms-muted);
      font-size: 12px;
      font-weight: 600;
    }

    body[data-page="index"] .picker-head h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 32px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    body[data-page="index"] .picker-head p {
      margin: 0;
      max-width: 34rem;
      color: var(--ms-muted);
      font-size: 14px;
      line-height: 1.65;
    }

    body[data-page="index"] .picker-form {
      display: grid;
      gap: 16px;
    }

    body[data-page="index"] .field {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    body[data-page="index"] .field-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    body[data-page="index"] label {
      color: var(--ms-muted);
      font-size: 12px;
      font-weight: 700;
    }

    body[data-page="index"] .field-control,
    body[data-page="index"] .multi-btn,
    body[data-page="index"] .menu-search,
    body[data-page="index"] #adminPasswordInput {
      width: 100%;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid #d8dde8;
      border-radius: 6px;
      background: #ffffff;
      color: var(--ms-text);
      font: inherit;
      box-shadow: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    body[data-page="index"] .field-control:focus,
    body[data-page="index"] .multi-btn:focus,
    body[data-page="index"] .menu-search:focus,
    body[data-page="index"] #adminPasswordInput:focus {
      outline: 0;
      border-color: rgba(91, 45, 142, 0.32);
      box-shadow: 0 0 0 3px rgba(91, 45, 142, 0.08);
    }

    body[data-page="index"] .multi {
      position: relative;
      display: grid;
      gap: 8px;
    }

    body[data-page="index"] .multi-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      font-weight: 600;
      text-align: right;
    }

    body[data-page="index"] .multi-btn:disabled,
    body[data-page="index"] .picker-action:disabled,
    body[data-page="index"] .picker-secondary:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    body[data-page="index"] .menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      left: 0;
      z-index: 20;
      display: grid;
      gap: 6px;
      max-height: 20rem;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid #d8dde8;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 8px 24px -12px rgba(15, 23, 42, 0.22);
    }

    body[data-page="index"] .menu.hidden,
    body[data-page="index"] .hidden {
      display: none !important;
    }

    body[data-page="index"] .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #ffffff;
      color: var(--ms-text);
      cursor: pointer;
    }

    body[data-page="index"] .menu-item:hover {
      background: #f5f5f5;
    }

    body[data-page="index"] .menu-item input {
      accent-color: var(--ms-purple);
    }

    body[data-page="index"] .menu-empty {
      justify-content: center;
      color: var(--ms-muted);
      cursor: default;
    }

    body[data-page="index"] .field-hint {
      margin: 0;
      color: var(--ms-muted);
      font-size: 12px;
      line-height: 1.65;
    }

    body[data-page="index"] .category-wrap {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--ms-border);
      border-radius: 8px;
      background: #faf9f8;
    }

    body[data-page="index"] .category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    body[data-page="index"] .category-chip {
      min-height: 30px;
      padding: 0 14px;
      border: 1px solid #d8dde8;
      border-radius: 999px;
      background: #ffffff;
      color: var(--ms-text);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    body[data-page="index"] .category-chip.active {
      background: #ede9f7;
      border-color: rgba(91, 45, 142, 0.16);
      color: var(--ms-purple);
    }

    body[data-page="index"] .picker-summary {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 14px;
      border: 1px solid var(--ms-border);
      border-radius: 8px;
      background: #faf9f8;
    }

    body[data-page="index"] .summary-item {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    body[data-page="index"] .summary-item span {
      color: var(--ms-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    body[data-page="index"] .summary-item strong {
      color: var(--ms-text);
      font-size: 17px;
      line-height: 1.2;
      word-break: break-word;
    }

    body[data-page="index"] .picker-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    body[data-page="index"] .picker-action,
    body[data-page="index"] .picker-secondary,
    body[data-page="index"] .dialog-btn {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    body[data-page="index"] .picker-action {
      flex: 1 1 260px;
      background: var(--ms-purple);
      color: #ffffff;
      box-shadow: none;
    }

    body[data-page="index"] .picker-secondary,
    body[data-page="index"] .dialog-btn.light {
      background: #ffffff;
      color: var(--ms-text);
      border: 1px solid #d8dde8;
    }

    body[data-page="index"] .dialog-btn.primary {
      background: var(--ms-purple);
      color: #ffffff;
    }

    body[data-page="index"] .picker-action:hover:not(:disabled),
    body[data-page="index"] .picker-secondary:hover:not(:disabled),
    body[data-page="index"] .dialog-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    body[data-page="index"] .picker-note {
      color: var(--ms-muted);
      font-size: 12px;
      line-height: 1.7;
    }

    body[data-page="index"] .admin-fab {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 50;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      background: #3b3a39;
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px -18px rgba(0, 0, 0, 0.45);
    }

    body[data-page="index"] .admin-fab.active {
      background: var(--ms-purple);
    }

    body[data-page="index"] .admin-fab-icon {
      display: inline-flex;
      width: 24px;
      justify-content: center;
      font-size: 18px;
    }

    body[data-page="index"] .admin-fab [data-admin-fab-label] {
      display: none;
    }

    body[data-page="index"] .sr-only-status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body[data-page="index"] .status {
      min-height: 38px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: var(--ms-text);
      font-size: 13px;
      line-height: 1.6;
    }

    body[data-page="index"] .status.warn {
      background: #fff9e9;
      border-color: #f0ddb2;
      color: #8a5b00;
    }

    body[data-page="index"] .status.err {
      background: #fff3f2;
      border-color: #f2cac7;
      color: #b42318;
    }

    body[data-page="index"] .status.ok {
      background: #f0fdf4;
      border-color: #cfe9d8;
      color: #166534;
    }

    body[data-page="index"] .bg-neutral-400,
    body[data-page="index"] .bg-emerald-500,
    body[data-page="index"] .bg-red-500 {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      flex: 0 0 auto;
    }

    body[data-page="index"] .bg-neutral-400 {
      background: #94a3b8;
    }

    body[data-page="index"] .bg-emerald-500 {
      background: #10b981;
    }

    body[data-page="index"] .bg-red-500 {
      background: #ef4444;
    }

    body[data-page="index"] dialog {
      border: 0;
      padding: 0;
      background: transparent;
    }

    body[data-page="index"] dialog::backdrop {
      background: rgba(15, 23, 42, 0.32);
      backdrop-filter: blur(6px);
    }

    body[data-page="index"] .dialog-card {
      width: min(100vw - 24px, 420px);
      display: grid;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--ms-border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 8px 24px -18px rgba(15, 23, 42, 0.28);
    }

    body[data-page="index"] .dialog-card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    body[data-page="index"] .dialog-card p {
      margin: 0;
      color: var(--ms-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    body[data-page="index"] .dialog-actions {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 760px) {
      body[data-page="index"] .picker-card {
        padding: 18px;
        border-radius: 10px;
      }

      body[data-page="index"] .picker-summary,
      body[data-page="index"] .dialog-actions {
        grid-template-columns: 1fr;
      }

      body[data-page="index"] .picker-actions {
        flex-direction: column;
      }

      body[data-page="index"] .picker-action,
      body[data-page="index"] .picker-secondary {
        width: 100%;
      }

      body[data-page="index"] .admin-fab {
        left: 16px;
        bottom: 16px;
      }
    }
  </style>
  <link rel="stylesheet" href="attendance.theme.css?v=20260326-45">
</head>
<body data-page="index">
  <main class="index-shell">
    <section id="launchPanel" class="picker-card" data-ready="0">
      <div class="picker-head">
        <div class="picker-topline">
          <span class="eyebrow">פתיחת עבודה</span>
          <div id="connectionIndicator" class="connection-pill">
            <span id="connectionIndicatorDot" class="bg-neutral-400"></span>
            <span id="connectionIndicatorText">מתחבר...</span>
          </div>
        </div>
        <div>
          <h1>בחירת נוכחות</h1>
        </div>
      </div>

      <div class="picker-form">
        <div class="field">
          <label for="dateSelect">תאריך פתוח</label>
          <select id="dateSelect" class="field-control"></select>
        </div>

        <div id="groupField" class="field">
          <div class="field-head">
            <label for="groupBtn">קבוצה / יחידה</label>
            <button id="clearGroupBtn" type="button" class="picker-secondary">נקה בחירה</button>
          </div>
          <div class="multi">
            <button id="groupBtn" type="button" class="multi-btn" aria-haspopup="true" aria-expanded="false" disabled>
              <span>טוען קבוצות...</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <input id="groupSearch" class="menu-search hidden" type="search" placeholder="חיפוש קבוצה או יחידה...">
            <div id="groupMenu" class="menu hidden"></div>
          </div>
          <p id="groupHint" class="field-hint">טוען קבוצות...</p>
        </div>

        <div id="groupCategoryField" class="field hidden">
          <div class="category-wrap">
            <label>בחירה מהירה לפי קטגוריה</label>
            <div id="groupCategoryList" class="category-list"></div>
            <p id="groupCategoryHint" class="field-hint"></p>
          </div>
        </div>
      </div>

      <div class="picker-summary">
        <article class="summary-item">
          <span>מוכנות</span>
          <strong id="selectionReadyValue">בחרו תאריך</strong>
        </article>
        <article class="summary-item">
          <span>תאריך</span>
          <strong id="selectionDateValue">לא נבחר</strong>
        </article>
        <article class="summary-item">
          <span>קבוצה</span>
          <strong id="selectionGroupValue">לא נבחרה</strong>
        </article>
      </div>

      <div class="picker-actions">
        <button id="openBtn" type="button" class="picker-action">פתח מסך נוכחות</button>
      </div>

      <div id="status" class="sr-only-status" data-status-style="sr-only">טוען את ההגדרות והקובץ...</div>
    </section>
  </main>

  <button id="adminFabBtn" type="button" class="admin-fab" aria-label="כניסת מנהל" title="כניסת מנהל">
    <span id="adminFabIcon" class="admin-fab-icon" aria-hidden="true">🔒</span>
    <span data-admin-fab-label>מנהל</span>
  </button>

  <dialog id="adminLoginDialog">
    <div class="dialog-card">
      <div>
        <h2>כניסת מנהל</h2>
      </div>
      <div class="field">
        <label for="adminPasswordInput">קוד מנהל</label>
        <input id="adminPasswordInput" type="password" autocomplete="current-password">
      </div>
      <div id="adminDialogStatus" class="status hidden"></div>
      <div class="dialog-actions">
        <button id="adminLoginBtn" type="button" class="dialog-btn primary">אישור</button>
        <button id="adminLoginCloseBtn" type="button" class="dialog-btn light">סגירה</button>
      </div>
    </div>
  </dialog>

  <script charset="utf-8" src="fontawesome/all.min.js"></script>
  <script charset="utf-8" src="js/xlsx.full.min.js?v=20260311-9"></script>
  <script charset="utf-8" src="attendance.config.js?v=20260329-1"></script>
  <script charset="utf-8" src="js/attendance.app.js?v=20260329-1"></script>
</body>
</html>
